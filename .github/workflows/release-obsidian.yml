name: Release Obsidian plugin

on:
  push:
    tags:
      - '[0-9]*'    # e.g. 0.0.1

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core + obsidian plugin
        run: |
          npm run build -w @logseq-synapses/core
          npm run build -w obsidian-plugin

      - name: Verify release assets exist
        run: |
          test -f manifest.json || { echo "::error::missing repo-root manifest.json"; exit 1; }
          for f in main.js styles.css; do
            test -f "packages/obsidian-plugin/$f" || { echo "::error::missing build artifact: $f"; exit 1; }
          done

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' (=$tag) does not match manifest version '$version'. Bump manifest.json or retag."
            exit 1
          fi

      - name: Publish GitHub Release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Synapses Obsidian plugin $GITHUB_REF_NAME. Install or update via BRAT (add this repository), or copy manifest.json + main.js + styles.css into your vault's .obsidian/plugins/synapses/ folder." \
            manifest.json \
            packages/obsidian-plugin/main.js \
            packages/obsidian-plugin/styles.css
